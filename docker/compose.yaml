name: the-doomsday-machine

services:
  php:
    image: ${IMAGES_PREFIX:-the-doomsday-machine}:dev-${IMAGES_TAG:-latest}
    restart: unless-stopped
    hostname: php
    environment:
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      PHP_DATE_TIMEZONE: ${APP_TIMEZONE:-UTC}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-128M}
      SERVER_NAME: localhost, php:80
      TZ: ${APP_TIMEZONE:-UTC}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ../:/app
      - ../var:/app/var
      - ./Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    hostname: ollama
    volumes:
      - ../data/ollama:/root/.ollama
      - ../llm/ollama:/ollama:ro
    tty: true

  open-webui:
    image: ghcr.io/open-webui/open-webui
    restart: unless-stopped
    hostname: open-webui
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ../data/open_webui:/app/backend/data
    ports:
      - '3000:8080'
    depends_on:
      - ollama

volumes:
  caddy_data:
  caddy_config:
